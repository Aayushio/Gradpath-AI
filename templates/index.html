<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GradPath AI — Your AI Study & Career Companion</title>
  <meta name="description" content="GradPath AI helps college students master concepts, prepare for exams, and plan their career with AI-powered guidance." />
  <link rel="stylesheet" href="/static/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
</head>
<body class="onboarding-page">

  <!-- Aurora animated background -->
  <div class="aurora">
    <div class="aurora-orb aurora-orb-1"></div>
    <div class="aurora-orb aurora-orb-2"></div>
    <div class="aurora-orb aurora-orb-3"></div>
  </div>

  <div class="onboarding-wrapper">
    <div class="onboarding-card">

      <!-- Branding -->
      <div class="brand">
        <div class="brand-icon-wrap">🎓</div>
        <h1 class="brand-name">GradPath AI</h1>
        <p class="brand-tagline">Your AI Study &amp; Career Companion</p>
        <div class="feature-pills">
          <span class="pill">🧠 Teach Me</span>
          <span class="pill">📝 Quiz Mode</span>
          <span class="pill">💼 Career</span>
          <span class="pill">⚡ Revision</span>
        </div>
      </div>

      <!-- Form -->
      <form id="onboardForm" action="/onboard" method="POST" novalidate>

        <div class="form-group">
          <label for="name">Your Name</label>
          <input type="text" id="name" name="name" placeholder="e.g. Arjun Sharma" autocomplete="off" />
          <span class="error-msg" id="nameError">Please enter your name</span>
        </div>

        <div class="form-group">
          <label for="subject">Subject / Stream</label>
          <select id="subject" name="subject">
            <option value="" disabled selected>Select your stream</option>
            <option value="Computer Science">Computer Science</option>
            <option value="Electronics">Electronics</option>
            <option value="Mechanical">Mechanical</option>
            <option value="Civil">Civil</option>
            <option value="Commerce">Commerce</option>
            <option value="Arts">Arts</option>
            <option value="Biology / Medical">Biology / Medical</option>
            <option value="Other">Other</option>
          </select>
          <span class="error-msg" id="subjectError">Please select your stream</span>
        </div>

        <div class="form-group">
          <label for="year">Year of Study</label>
          <select id="year" name="year">
            <option value="" disabled selected>Select your year</option>
            <option value="1st Year">1st Year</option>
            <option value="2nd Year">2nd Year</option>
            <option value="3rd Year">3rd Year</option>
            <option value="4th Year">4th Year</option>
            <option value="Postgraduate">Postgraduate</option>
          </select>
          <span class="error-msg" id="yearError">Please select your year</span>
        </div>

        <button type="submit" class="btn-primary" id="submitBtn">
          <span>Launch GradPath AI</span>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M5 12h14M12 5l7 7-7 7"/>
          </svg>
        </button>

      </form>

      <p class="onboarding-footer">✦ No account needed &nbsp;·&nbsp; Free to use &nbsp;·&nbsp; Powered by Groq AI</p>
    </div>
  </div>

  <script>
    document.getElementById("onboardForm").addEventListener("submit", function (e) {
      let valid = true;
      const name = document.getElementById("name").value.trim();
      const subject = document.getElementById("subject").value;
      const year = document.getElementById("year").value;
      document.querySelectorAll(".error-msg").forEach(el => el.classList.remove("show"));
      if (!name) { document.getElementById("nameError").classList.add("show"); valid = false; }
      if (!subject) { document.getElementById("subjectError").classList.add("show"); valid = false; }
      if (!year) { document.getElementById("yearError").classList.add("show"); valid = false; }
      if (!valid) e.preventDefault();
    });
  </script>
</body>
</html>
